name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v4

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          system-features = kvm

    - name: Enable Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Generate and commit Cargo.lock (if missing)
      run: |
        if [ ! -f Cargo.lock ]; then
          cargo generate-lockfile
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: auto-generate Cargo.lock"
          git push
        fi

    - name: Format Nix files and commit
      run: |
        nix fmt
        if [[ `git status --porcelain` ]]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-format nix files"
          git push
        fi

    - name: Run Nix flake check (VM Integration Tests)
      run: nix flake check -L

    - name: Build Rust binary
      run: nix build .#nix-secret-bridge -L

    - name: Build NixOS module test
      run: nix build .#checks.x86_64-linux.default -L
